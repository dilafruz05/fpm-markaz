<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPM Markazi • Namangan</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
        
        /* Mobil menyu ochilganda animatsiya */
        #mobile-menu.active {
            display: flex !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <nav class="bg-blue-600 p-4 sticky top-0 z-[1000] shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center overflow-hidden border-2 border-white">
                    <img src="logo.png" alt="L" onerror="this.src='https://ui-avatars.com/api/?name=FPM&background=0D8ABC&color=fff'" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="logo-font text-xl font-bold leading-none">FPM Markazi</h1>
                    <p class="text-[10px] opacity-80 uppercase tracking-tighter">Namangan viloyati</p>
                </div>
            </div>

            <div class="hidden md:flex gap-6 font-semibold">
                <a href="index.html" class="hover:text-emerald-400 transition">Bosh sahifa</a>
                <a href="about.html" class="hover:text-emerald-400 transition">Haqida</a>
                <a href="services.html" class="hover:text-emerald-400 transition">Xizmatlar</a>
                <a href="contact.html" class="hover:text-emerald-400 transition">Kontaktlar</a>
            </div>

            <button id="menu-btn" class="md:hidden text-3xl text-white p-2 focus:outline-none hover:bg-blue-700 rounded-lg transition">
                <i class="fa-solid fa-bars" id="menu-icon"></i>
            </button>
        </div>

        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-blue-800 border-t border-blue-500 flex-col p-6 gap-4 shadow-2xl md:hidden">
            <a href="index.html" class="text-lg py-2 border-b border-blue-700 active:text-emerald-400">Bosh sahifa</a>
            <a href="about.html" class="text-lg py-2 border-b border-blue-700">Haqida</a>
            <a href="services.html" class="text-lg py-2 border-b border-blue-700">Xizmatlar</a>
            <a href="contact.html" class="text-lg py-2">Kontaktlar</a>
        </div>
    </nav>

    <header class="relative min-h-[80vh] flex items-center justify-center px-6 text-center">
        <div class="absolute inset-0 z-0">
            <img src="building.jpg" alt="" class="w-full h-full object-cover opacity-30">
        </div>
        
        <div class="relative z-10 max-w-4xl">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
                Namangan Viloyat Ftiziatriya va Pulmonologiya Markazi
            </h2>
            <p class="text-lg md:text-xl text-gray-300 mb-10">
                Sil va o‘pka kasalliklarini zamonaviy uskunalar bilan davolash
            </p>
            <a href="contact.html" class="inline-block bg-emerald-600 hover:bg-emerald-700 text-white text-xl font-bold py-4 px-10 rounded-full transition transform hover:scale-105 shadow-lg">
                Qabulga yozilish
            </a>
        </div>
    </header>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        menuBtn.addEventListener('click', () => {
            // Menyu ochish/yopish
            mobileMenu.classList.toggle('hidden');
            mobileMenu.classList.toggle('flex');
            
            // Ikonkani o'zgartirish (bars -> xmark)
            if (menuIcon.classList.contains('fa-bars')) {
                menuIcon.classList.replace('fa-bars', 'fa-xmark');
            } else {
                menuIcon.classList.replace('fa-xmark', 'fa-bars');
            }
        });
    </script>
</body>
</html>
