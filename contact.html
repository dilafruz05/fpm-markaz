<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">

    <nav class="bg-blue-700 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="w-12 h-12 rounded-full border-2 border-white">
                <h1 class="text-xl md:text-2xl font-bold">FPM Markazi</h1>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="index.html">Bosh sahifa</a>
                <a href="about.html">Markaz haqida</a>
                <a href="services.html">Xizmatlar</a>
                <a href="doctors.html">Shifokorlar</a>
                <a href="contact.html" class="text-emerald-400">Kontaktlar</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-2xl focus:outline-none"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-blue-800 border-t border-blue-600">
            <div class="flex flex-col space-y-2 px-6 py-6 font-medium">
                <a href="index.html" class="py-3 border-b border-blue-700">Bosh sahifa</a>
                <a href="about.html" class="py-3 border-b border-blue-700">Markaz haqida</a>
                <a href="services.html" class="py-3 border-b border-blue-700">Xizmatlar</a>
                <a href="doctors.html" class="py-3 border-b border-blue-700">Shifokorlar</a>
                <a href="contact.html" class="py-3 text-emerald-400">Kontaktlar</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold text-center text-blue-900 mb-12">Biz bilan bog'laning</h2>
        
        <div class="grid md:grid-cols-2 gap-12">
            <div class="bg-white p-10 rounded-3xl shadow-xl">
                <h3 class="text-2xl font-bold mb-8">Ma'lumotlarimiz</h3>
                <div class="space-y-6">
                    <div class="flex gap-4 items-center">
                        <i class="fa-solid fa-phone text-2xl text-emerald-600"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Ishonch telefoni</p>
                            <a href="tel:+998692247214" class="text-xl font-bold">+998 69 224 72 14</a>
                        </div>
                    </div>
                    <div class="flex gap-4 items-center">
                        <i class="fa-solid fa-location-dot text-2xl text-blue-600"></i>
                        <div>
                            <p class="text-xs text-gray-500 uppercase">Manzil</p>
                            <p class="font-medium">Namangan sh., Q. Otamirzaev ko'chasi, 36-uy</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-10 rounded-3xl shadow-xl border-t-8 border-emerald-600">
                <h3 class="text-2xl font-bold mb-6">Savolingiz bormi?</h3>
                <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4">
                    <input type="hidden" name="access_key" value="e71c4c30-9b30-4519-bced-c1eef51c1ea1">
                    <input type="text" name="name" placeholder="Ismingiz" required class="w-full p-4 bg-gray-50 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    <input type="tel" name="phone" placeholder="Telefoningiz" required class="w-full p-4 bg-gray-50 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    <textarea name="message" placeholder="Sizga qanday yordam bera olamiz?" rows="4" class="w-full p-4 bg-gray-50 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition shadow-lg">Xabarni yuborish</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            btn.querySelector('i').classList.toggle('fa-bars');
            btn.querySelector('i').classList.toggle('fa-xmark');
        });
    </script>
</body>
</html>
